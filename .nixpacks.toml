# nixpacks.toml compatible con Nixpacks 7+
[phases.setup]
packages = [
  "php@8.3",
  "php-mbstring",
  "php-bcmath",
  "php-pdo",
  "php-curl",
  "php-xml",
  "composer",
  "git",
  "nodejs",
  "npm",
  "zip",
  "unzip"
]

[phases.install]
commands = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "php artisan key:generate",
  "php artisan config:cache",
  "php artisan route:cache"
]

[phases.build]
commands = [
  "npm run build"
]

[phases.start]
command = "php artisan serve --host=0.0.0.0 --port=$PORT"